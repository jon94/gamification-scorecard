<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Datadog Adoption Scorecard — Demo</title>
  <!-- Demo mode: load static snapshot, skip live API fetch -->
  <script src="/data.demo.js"></script>
  <script src="/data.sample.js"></script>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<div id="demo-banner">
  🎯 DEMO MODE — Sample data with seeded champion progress.
</div>

<header>
  <div class="header-logo">
    <img src="/dd-logo.png" alt="Datadog" class="dd-logo">
    <div class="header-title-group">
      <h1 class="header-title">Datadog <span>Adoption Scorecard</span></h1>
      <div class="header-subtitle">🏇 Hong Kong Jockey Club</div>
    </div>
  </div>
  <div class="header-meta">
    <div>
      <div class="header-org">Org: <strong id="hdr-org-name">Demo</strong></div>
      <div class="header-updated">Last updated: <span id="hdr-last-updated">—</span></div>
    </div>
    <button class="btn-admin-lock" id="btn-admin-lock" onclick="toggleAdminLock()" title="Admin mode">🔒</button>
  </div>
</header>

<div class="pin-backdrop" id="pin-backdrop" onclick="closePinModal()"></div>
<div class="pin-modal" id="pin-modal">
  <div class="pin-icon">🔒</div>
  <div class="pin-title">Admin Mode</div>
  <div class="pin-subtitle">Enter the admin PIN to unlock circle editing</div>
  <input class="pin-input" id="pin-input" type="password" maxlength="20"
    placeholder="Enter PIN" autocomplete="off"
    onkeydown="if(event.key==='Enter')submitPin(); if(event.key==='Escape')closePinModal()">
  <div class="pin-error" id="pin-error"></div>
  <div class="pin-actions">
    <button class="pin-btn-cancel" onclick="closePinModal()">Cancel</button>
    <button class="pin-btn-submit" onclick="submitPin()">Unlock</button>
  </div>
</div>


<div id="view-grid" class="view active">
  <div class="grid-layout">
    <div class="grid-main">
      <div id="cert-grid-container" class="cert-grid-wrap"></div>
    </div>
    <div class="awards-panel" id="awards-panel"></div>
  </div>
</div>

<div class="tooltip-overlay" id="tooltip"></div>
<div class="ev-backdrop" id="ev-backdrop" onclick="closeEvidenceModal()"></div>
<div class="ev-modal" id="ev-modal" role="dialog" aria-modal="true">
  <button class="ev-close" onclick="closeEvidenceModal()" aria-label="Close">×</button>
  <div id="ev-modal-content"></div>
</div>

<script src="/script.js"></script>
</body>
</html>
