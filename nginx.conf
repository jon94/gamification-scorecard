# Nginx reverse proxy config for Datadog Adoption Scorecard
# Place at: /etc/nginx/sites-available/scorecard
# Then: sudo ln -s /etc/nginx/sites-available/scorecard /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name YOUR_DOMAIN_HERE;          # e.g. scorecard.hkjc.org.hk

    # Redirect all HTTP to HTTPS (uncomment after running certbot)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }
}

# HTTPS block — certbot will add this automatically when you run:
# sudo certbot --nginx -d YOUR_DOMAIN_HERE
