<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Datadog Adoption Scorecard</title>

  <!-- Try live data first; on error fall back to sample -->
  <script>
    window.__dataLoaded = false;
    window.__isSample = false;
    function loadSampleData() {
      // data.js failed to load — mark as sample mode
      window.__isSample = true;
    }
  </script>
  <script src="data.js" onerror="loadSampleData()"></script>
  <script src="data.sample.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Demo mode banner -->
<div id="demo-banner">
  🎯 DEMO MODE — Run <code>node refresh.js</code> with your Datadog API keys to load live data.
  <span>Sample data is shown below.</span>
</div>

<!-- Header -->
<header>
  <div class="header-logo">
    <img src="/dd-logo.png" alt="Datadog" class="dd-logo">
    <div class="logo-divider"></div>
    <img src="/hkjc-logo.png" alt="HKJC" class="hkjc-logo">
    <div class="header-title-group">
      <h1 class="header-title">Datadog <span>Adoption Scorecard</span></h1>
      <div class="header-subtitle">Hong Kong Jockey Club</div>
    </div>
  </div>

  <div class="header-meta">
    <div>
      <div class="header-org">Org: <strong id="hdr-org-name">Loading…</strong></div>
      <div class="header-updated">
        Last updated: <span id="hdr-last-updated">—</span>
        <span id="hdr-fetch-status" class="fetch-status" style="display:none">
          <span class="fetch-spinner">⟳</span> Fetching data…
        </span>
      </div>
    </div>
    <button class="btn-admin-lock" id="btn-admin-lock" onclick="toggleAdminLock()" title="Admin mode — click to unlock circle editing">
      🔒
    </button>
    <button class="btn-refresh" onclick="handleRefresh()">↻ Refresh</button>
  </div>
</header>

<!-- PIN entry modal -->
<div class="pin-backdrop" id="pin-backdrop" onclick="closePinModal()"></div>
<div class="pin-modal" id="pin-modal">
  <div class="pin-icon">🔒</div>
  <div class="pin-title">Admin Mode</div>
  <div class="pin-subtitle">Enter the admin PIN to unlock circle editing</div>
  <input class="pin-input" id="pin-input" type="password" maxlength="20"
    placeholder="Enter PIN" autocomplete="off"
    onkeydown="if(event.key==='Enter')submitPin(); if(event.key==='Escape')closePinModal()">
  <div class="pin-error" id="pin-error"></div>
  <div class="pin-actions">
    <button class="pin-btn-cancel" onclick="closePinModal()">Cancel</button>
    <button class="pin-btn-submit" onclick="submitPin()">Unlock</button>
  </div>
</div>


<!-- VIEW: Certification Grid -->
<div id="view-grid" class="view active">
  <div class="grid-layout">
    <div class="grid-main">
      <div id="cert-grid-container" class="cert-grid-wrap">
        <!-- Rendered by script.js -->
      </div>
    </div>
    <div class="awards-panel" id="awards-panel">
      <!-- Rendered by script.js -->
    </div>
  </div>
</div>

<!-- Tooltip overlay -->
<div class="tooltip-overlay" id="tooltip"></div>

<!-- Evidence modal -->
<div class="ev-backdrop" id="ev-backdrop" onclick="closeEvidenceModal()"></div>
<div class="ev-modal" id="ev-modal" role="dialog" aria-modal="true">
  <button class="ev-close" onclick="closeEvidenceModal()" aria-label="Close">×</button>
  <div id="ev-modal-content"></div>
</div>

<script src="script.js"></script>
</body>
</html>
